<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michel's Strava Running Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e8f0; min-height: 100vh; }
  
  header { background: linear-gradient(135deg, #fc4c02 0%, #e03a00 100%); padding: 28px 32px; display: flex; align-items: center; gap: 16px; }
  header svg { width: 40px; height: 40px; fill: white; opacity: 0.9; }
  header h1 { font-size: 1.6rem; font-weight: 700; color: white; }
  header p { color: rgba(255,255,255,0.8); font-size: 0.9rem; margin-top: 2px; }

  .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 14px; padding: 20px; text-align: center; transition: transform 0.15s; }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card .value { font-size: 2rem; font-weight: 800; color: #fc4c02; line-height: 1; }
  .stat-card .label { font-size: 0.75rem; color: #888; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .sub { font-size: 0.8rem; color: #aaa; margin-top: 4px; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 14px; padding: 22px; }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-card h2 { font-size: 0.95rem; font-weight: 600; color: #ccc; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
  .chart-wrap { position: relative; width: 100%; }

  .pb-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .pb-table th { text-align: left; color: #666; font-weight: 500; padding: 6px 10px; border-bottom: 1px solid #2a2a38; font-size: 0.75rem; text-transform: uppercase; }
  .pb-table td { padding: 8px 10px; border-bottom: 1px solid #1e1e2a; }
  .pb-table tr:last-child td { border-bottom: none; }
  .pb-table .highlight { color: #fc4c02; font-weight: 700; }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
  .filter-bar label { font-size: 0.8rem; color: #888; }
  .filter-btn { background: #1a1a24; border: 1px solid #2a2a38; color: #ccc; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.82rem; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: #fc4c02; border-color: #fc4c02; color: white; }

  @media (max-width: 768px) {
    .charts-grid { grid-template-columns: 1fr; }
    .chart-card.wide { grid-column: 1; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <svg viewBox="0 0 24 24"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
  <div>
    <h1>Michel's Running Dashboard</h1>
    <p>Strava activity analysis · 2021 – 2026</p>
  </div>
</header>

<div class="container">

  <div class="stats-grid" id="stats-grid"></div>

  <div class="filter-bar">
    <label>Show:</label>
    <button class="filter-btn active" onclick="setYear('all')">All Time</button>
    <button class="filter-btn" onclick="setYear(2023)">2023</button>
    <button class="filter-btn" onclick="setYear(2024)">2024</button>
    <button class="filter-btn" onclick="setYear(2025)">2025</button>
    <button class="filter-btn" onclick="setYear(2026)">2026</button>

  <div class="charts-grid">
    <div class="chart-card wide">
      <h2>📅 Monthly Distance &amp; Run Count</h2>
      <div class="chart-wrap" style="height:260px">
        <canvas id="monthlyChart"></canvas>
      </div>
    </div>
    <div class="chart-card wide">
      <h2>🏃 Pace Over Time (min/km)</h2>
      <div class="chart-wrap" style="height:240px">
        <canvas id="paceChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h2>❤️ Average Heart Rate Over Time</h2>
      <div class="chart-wrap" style="height:240px">
        <canvas id="hrChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h2>📆 Runs by Day of Week</h2>
      <div class="chart-wrap" style="height:240px">
        <canvas id="dowChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h2>📏 Run Distance Distribution</h2>
      <div class="chart-wrap" style="height:240px">
        <canvas id="distChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h2>🏆 Personal Bests by Year</h2>
      <table class="pb-table" id="pbTable"></table>
    </div>
    <div class="chart-card wide">
      <h2>⛰️ Monthly Elevation Gain (m)</h2>
      <div class="chart-wrap" style="height:200px">
        <canvas id="elevChart"></canvas>
      </div>
    </div>
  </div>
</div>

const ORANGE = '#fc4c02';
const ORANGE_LIGHT = 'rgba(252,76,2,0.15)';
const ORANGE_MED = 'rgba(252,76,2,0.6)';
const BLUE = '#4c9afc';
const BLUE_LIGHT = 'rgba(76,154,252,0.2)';
const GREEN = '#2ecc71';

Chart.defaults.color = '#888';
Chart.defaults.borderColor = '#2a2a38';

let currentYear = 'all';
let charts = {};

function fmt_pace(p) {
  const m = Math.floor(p);
  const s = Math.round((p - m) * 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function filteredScatter() {
  if (currentYear === 'all') return RAW.scatter;
  return RAW.scatter.filter(r => r.date.startsWith(currentYear.toString()));
}

function filteredMonthly() {
  let months = RAW.months;
  let dist = RAW.month_dist;
  let count = RAW.month_count;
  let elev = RAW.month_elev;
  if (currentYear !== 'all') {
    const prefix = currentYear.toString();
    const idxs = months.map((m,i) => m.startsWith(prefix) ? i : -1).filter(i => i >= 0);
    months = idxs.map(i => months[i]);
    dist = idxs.map(i => dist[i]);
    count = idxs.map(i => count[i]);
    elev = idxs.map(i => elev[i]);
  }
  return {months, dist, count, elev};
}

function makeMonthLabel(m) {
  const [y, mo] = m.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return names[parseInt(mo)-1] + " '" + y.slice(2);
}

// Stat cards
function buildStats() {
  const sc = filteredScatter();
  const fm = filteredMonthly();
  const totalDist = sc.reduce((a,r) => a+r.dist, 0);
  const totalRuns = sc.length;
  const maxDist = sc.length ? Math.max(...sc.map(r=>r.dist)) : 0;
  const validPace = sc.filter(r => r.dist > 5 && r.pace > 0);
  const bestPace = validPace.length ? Math.min(...validPace.map(r=>r.pace)) : 0;
  const totalElev = sc.reduce((a,r) => a+r.elev, 0);
  const avgDist = totalRuns ? totalDist/totalRuns : 0;

  const stats = [
    {value: totalRuns, label: 'Total Runs', sub: ''},
    {value: totalDist.toFixed(0) + ' km', label: 'Total Distance', sub: ''},
    {value: totalElev.toFixed(0) + ' m', label: 'Elevation Gained', sub: ''},
    {value: maxDist.toFixed(1) + ' km', label: 'Longest Run', sub: ''},
    {value: bestPace ? fmt_pace(bestPace) + '/km' : '—', label: 'Best Pace (>5km)', sub: ''},
    {value: avgDist.toFixed(1) + ' km', label: 'Avg Run Distance', sub: ''},
  ];

  document.getElementById('stats-grid').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="value">${s.value}</div>
      <div class="label">${s.label}</div>
      ${s.sub ? `<div class="sub">${s.sub}</div>` : ''}
    </div>
  `).join('');
}

function buildMonthlyChart() {
  const {months, dist, count} = filteredMonthly();
  const labels = months.map(makeMonthLabel);
  const ctx = document.getElementById('monthlyChart').getContext('2d');
  if (charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        { type:'bar', label:'Distance (km)', data: dist, backgroundColor: ORANGE_MED, yAxisID:'y', borderRadius: 4 },
        { type:'line', label:'Runs', data: count, borderColor: BLUE, backgroundColor: BLUE_LIGHT, yAxisID:'y2', tension:0.4, pointRadius:3, fill:false }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#aaa',font:{size:11}}}},
      scales:{
        y:{title:{display:true,text:'km',color:'#666'},grid:{color:'#1e1e2a'},ticks:{color:'#666'}},
        y2:{position:'right',title:{display:true,text:'runs',color:'#666'},grid:{display:false},ticks:{color:'#666'}}
      }
    }
  });
}

function buildPaceChart() {
  const sc = filteredScatter().filter(r => r.dist > 1 && r.pace > 0 && r.pace < 12);
  sc.sort((a,b) => a.date.localeCompare(b.date));
  // 10-run rolling avg
  const rolling = sc.map((r,i) => {
    const window = sc.slice(Math.max(0, i-9), i+1);
    return window.reduce((a,x) => a+x.pace, 0) / window.length;
  });
  const ctx = document.getElementById('paceChart').getContext('2d');
  if (charts.pace) charts.pace.destroy();
  charts.pace = new Chart(ctx, {
    type:'line',
    data:{
      labels: sc.map(r => r.date),
      datasets:[
        {label:'Pace (min/km)', data:sc.map(r=>r.pace), borderColor:'rgba(252,76,2,0.3)', pointRadius:2, tension:0.2, fill:false, borderWidth:1},
        {label:'10-run avg', data:rolling, borderColor:ORANGE, pointRadius:0, tension:0.4, fill:false, borderWidth:2.5}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#aaa',font:{size:11}}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt_pace(ctx.raw)}/km`}}
      },
      scales:{
        y:{reverse:true,title:{display:true,text:'min/km (lower = faster)',color:'#666'},grid:{color:'#1e1e2a'},ticks:{color:'#666',callback:v=>fmt_pace(v)}},
        x:{ticks:{color:'#666',maxTicksLimit:8}}
      }
    }
  });
}

function buildHRChart() {
  let pts = RAW.hr_runs.filter(r => r[1] > 0);
  if (currentYear !== 'all') pts = pts.filter(r => r[0].startsWith(currentYear.toString()));
  pts.sort((a,b) => a[0].localeCompare(b[0]));
  const rolling = pts.map((r,i) => {
    const w = pts.slice(Math.max(0,i-9),i+1);
    return w.reduce((a,x)=>a+x[1],0)/w.length;
  });
  const ctx = document.getElementById('hrChart').getContext('2d');
  if (charts.hr) charts.hr.destroy();
  charts.hr = new Chart(ctx,{
    type:'line',
    data:{
      labels:pts.map(r=>r[0]),
      datasets:[
        {label:'Avg HR', data:pts.map(r=>r[1]), borderColor:'rgba(231,76,60,0.3)', pointRadius:2, fill:false, borderWidth:1},
        {label:'10-run avg', data:rolling, borderColor:'#e74c3c', pointRadius:0, tension:0.4, fill:false, borderWidth:2.5}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#aaa',font:{size:11}}}},
      scales:{
        y:{title:{display:true,text:'BPM',color:'#666'},grid:{color:'#1e1e2a'},ticks:{color:'#666'}},
        x:{ticks:{color:'#666',maxTicksLimit:8}}
      }
    }
  });
}

function buildDowChart() {
  const sc = filteredScatter();
  const dow_c = new Array(7).fill(0);
  const dow_d = new Array(7).fill(0);
  sc.forEach(r => {
    const d = new Date(r.date).getUTCDay(); // 0=Sun
    const mapped = (d+6)%7; // Mon=0
    dow_c[mapped]++;
    dow_d[mapped] += r.dist;
  });
  const ctx = document.getElementById('dowChart').getContext('2d');
  if (charts.dow) charts.dow.destroy();
  charts.dow = new Chart(ctx,{
    type:'bar',
    data:{
      labels:RAW.dow_names,
      datasets:[
        {label:'Runs', data:dow_c, backgroundColor:ORANGE_MED, borderRadius:4, yAxisID:'y'},
        {label:'Distance (km)', data:dow_d.map(d=>Math.round(d)), backgroundColor:BLUE_LIGHT, borderColor:BLUE, borderWidth:1, borderRadius:4, yAxisID:'y2'}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#aaa',font:{size:11}}}},
      scales:{
        y:{title:{display:true,text:'runs',color:'#666'},grid:{color:'#1e1e2a'},ticks:{color:'#666'}},
        y2:{position:'right',title:{display:true,text:'km',color:'#666'},grid:{display:false},ticks:{color:'#666'}}
      }
    }
  });
}

function buildDistChart() {
  const sc = filteredScatter();
  const buckets = {'0–5 km':0,'5–10 km':0,'10–15 km':0,'15–20 km':0,'20+ km':0};
  sc.forEach(r => {
    if (r.dist < 5) buckets['0–5 km']++;
    else if (r.dist < 10) buckets['5–10 km']++;
    else if (r.dist < 15) buckets['10–15 km']++;
    else if (r.dist < 20) buckets['15–20 km']++;
    else buckets['20+ km']++;
  });
  const ctx = document.getElementById('distChart').getContext('2d');
  if (charts.dist) charts.dist.destroy();
  charts.dist = new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:Object.keys(buckets),
      datasets:[{data:Object.values(buckets), backgroundColor:['#2ecc71','#27ae60','#fc4c02','#e03a00','#c0392b'], borderWidth:0, hoverOffset:6}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{color:'#aaa',font:{size:11},padding:12}}}
    }
  });
}

function buildElevChart() {
  const {months, elev} = filteredMonthly();
  const ctx = document.getElementById('elevChart').getContext('2d');
  if (charts.elev) charts.elev.destroy();
  charts.elev = new Chart(ctx,{
    type:'bar',
    data:{
      labels:months.map(makeMonthLabel),
      datasets:[{label:'Elevation (m)', data:elev, backgroundColor:'rgba(46,204,113,0.5)', borderColor:'#2ecc71', borderWidth:1, borderRadius:4}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#aaa',font:{size:11}}}},
      scales:{
        y:{title:{display:true,text:'metres',color:'#666'},grid:{color:'#1e1e2a'},ticks:{color:'#666'}},
        x:{ticks:{color:'#666',maxTicksLimit:12}}
      }
    }
  });
}

function buildPBTable() {
  const pb = RAW.stats.pb_pace;
  const pl = RAW.stats.pb_long;
  const years = Object.keys(pb).sort();
  let rows = `<tr><th>Year</th><th>Best Pace (>5km)</th><th>Longest Run</th></tr>`;
  years.forEach(y => {
    rows += `<tr>
      <td>${y}</td>
      <td class="highlight">${pb[y] ? pb[y].fmt : '—'} /km</td>
      <td class="highlight">${pl[y] ? pl[y] + ' km' : '—'}</td>
    </tr>`;
  });
  document.getElementById('pbTable').innerHTML = rows;
}

function setYear(y) {
  currentYear = y;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (y === 'all' ? 'All Time' : y.toString()));
  });
  buildAll();
}

function buildAll() {
  buildStats();
  buildMonthlyChart();
  buildPaceChart();
  buildHRChart();
  buildDowChart();
  buildDistChart();
  buildElevChart();
  buildPBTable();
}

buildAll();
</script>
</body>
</html>
