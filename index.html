<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Running Analysis</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e8edf6;
      --muted: #9aa5b1;
      --accent: #fc4c02;
      --border: #242a36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1c2230 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(860px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(180deg, #1a1f2b, var(--card));
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }
    .links {
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      padding: 14px 16px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      background: #131722;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }
    a:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }
    .label {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .hint {
      color: var(--muted);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Running Analysis</h1>
    <p>Standalone project pages for training insights, trends, and planning.</p>
    <section class="links">
      <a href="running_deep_insights.html">
        <div class="label">Deep Running Insights</div>
        <div class="hint">Long-form analysis, injury retrospective, ACWR/HRV context, and marathon timeline.</div>
      </a>
      <a href="running_dashboard.html">
        <div class="label">Running Dashboard</div>
        <div class="hint">Companion dashboard view for quick scanning of key metrics.</div>
      </a>
    </section>
  </main>
</body>
</html>
